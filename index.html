<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiqHawk — Real-time liquidation risk monitor for Mantle</title>
    <meta
      name="description"
      content="LiqHawk tracks every borrow position on Mantle across INIT Capital and Lendle, ranking each one by how close it is to liquidation. Live health factors, risk levels, and instant alerts via Telegram and Discord."
    />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="LiqHawk — Real-time liquidation risk monitor for Mantle" />
    <meta
      property="og:description"
      content="Live health factors and liquidation risk for every borrow position on Mantle (INIT Capital, Lendle). Real-time alerts via Telegram and Discord."
    />
    <meta property="og:site_name" content="LiqHawk" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="LiqHawk — Real-time liquidation risk monitor for Mantle" />
    <meta
      name="twitter:description"
      content="Live health factors and liquidation risk for every borrow position on Mantle. Alerts on Telegram & Discord."
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
